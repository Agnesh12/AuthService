spring:
  application:
    name: AuthService
  datasource:
    url: jdbc:postgresql://localhost:5432/AuthService
    username: postgres
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

    jpa:
      show-sql: true
      properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8081